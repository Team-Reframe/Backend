spring:
  datasource:
    url: jdbc:mysql://localhost:3307/${MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mvc:
    servlet:
      path: /api/v1

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  kakao:
    api:
      key:
        rest: ${KAKAO_API_KEY_REST}

  naver:
    ocr:
      invoke-url: ${NAVER_OCR_INVOKE_URL}
      secret-key: ${NAVER_OCR_SECRET_KEY}


server:
  port: 8081
